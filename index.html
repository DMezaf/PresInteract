<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VMS Energy — EPC, Iluminación y Soluciones Electromecánicas | Prototipo de Alta Conversión</title>
  <meta name="description" content="VMS Energy: EPC eléctrico y de iluminación industrial. Diseño, procura y construcción de sistemas eléctricos, alumbrado y automatización con marcas líderes. Sustentabilidad certificada. Solicita una cotización." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style id="vms-style-clean">
  :root{
    --navy:#172C51;        /* VMS navy */
    --cobalt:#0F4C81;      /* VMS cobalt */
    --sky:#3A6FA5;         /* acento */
    --ink:#EAF2FF;         /* texto sobre fondo oscuro */
    --muted:rgba(234,242,255,.78);
    --line:rgba(120,190,255,.10);
    --shadow: 0 22px 60px rgba(0,0,0,.35);
    --r-xl:18px;
    --r-lg:16px;
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:"Roboto Condensed",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:#ffffff;
    color:#0F172A;
  }

  .container{
    max-width:1180px;
    margin-inline:auto;
    padding-inline:clamp(16px,3vw,24px);
    width:100%;
  }

  /* ===== Sección (Blueprint) ===== */
  .svc{
    position:relative;
    padding:clamp(28px,4vw,56px) 0;
    color:var(--ink);
    background:
      radial-gradient(1200px 680px at 20% 10%, rgba(255, 255, 255, 0.18), transparent 60%),
      radial-gradient(900px 520px at 90% 20%, rgba(15,76,129,.20), transparent 55%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.92));
    overflow:hidden;
    border-top:1px solid rgba(255,255,255,.06);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .svc::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:.35;
    pointer-events:none;
  }

  .svc .container{position:relative; z-index:1;}

  .svc__kicker{
    margin:0 0 6px;
    font-size:.92rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .svc__title{
    margin:0;
    font-size:clamp(1.35rem,2.4vw,2.05rem);
    line-height:1.1;
    color:var(--ink);
  }

  /* ===== Cards corporativo ===== */
  .cv-corporativo{
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:16px;
    margin-top:14px;
  }

  .cv-card{
    position:relative;
    border-radius:var(--r-xl);
    overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    box-shadow:0 10px 26px rgba(0,0,0,.28);
    transform:translateZ(0);
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }

  .cv-card:hover{
    transform:translateY(-3px);
    border-color:rgba(180,235,255,.26);
    box-shadow:var(--shadow);
  }

  .cv-card img{
    width:100%;
    height:100%;
    aspect-ratio: 4 / 5;
    object-fit:cover;
    object-position:center 32%;
    display:block;
    opacity:.95;
    transition:opacity .18s ease, filter .18s ease;
  }
  .cv-card:hover img{
    opacity:1;
    filter:contrast(1.06) saturate(1.03);
  }

  .cv-card__link{
    display:block;
    color:inherit;
    text-decoration:none;
  }

  .cv-card-footer{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:linear-gradient(to top, rgba(15,76,129,.92), rgba(15,76,129,0));
  }
  .cv-card-footer span{
    color:var(--ink);
    font-weight:800;
    letter-spacing:.01em;
    text-shadow:0 8px 24px rgba(0,0,0,.55);
  }

  /* ===== Botones ===== */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    font-weight:800;
    letter-spacing:.2px;
    padding:10px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);
    color:var(--ink);
    min-height:44px; /* touch-friendly */
    transition:transform .18s ease, background .18s ease, border-color .18s ease, filter .18s ease;
    white-space:nowrap;
  }
  .btn:hover{
    transform:translateY(-1px);
    background:rgba(0, 0, 0, 0.1);
    border-color:rgba(0, 0, 0, 0.24);
  }
  .btn:focus-visible{
    outline:2px solid #22C55E;
    outline-offset:2px;
  }

  /* Tu HTML usa "btn-primary" (no "btn--primary") */
  .btn-primary{
    background:rgba(15,76,129,.10);
    border-color:rgba(180,235,255,.28);
    color:rgba(230,250,255,.98);
  }
  .btn-primary:hover{ filter:brightness(1.02); }

  /* ===== Responsive ===== */
  @media (max-width:980px){
    .cv-corporativo{ grid-template-columns:1fr; }
    .cv-card img{ aspect-ratio:16/10; object-position:center 30%; }
  }
</style>



</head>
<body>

    <section id="cv-corporativo" class="svc" aria-labelledby="svcTitleCoporativo">

    <section class="cv-corporativo" aria-label="Selección de empresa">
      <article class="cv-card" data-type="VMS Energy">
        <a class="cv-card__link" href="VMS_Brief/VMS%20Energy.html">
          <img src="VMS_Brief/assets/brand/Logos/vms_logo_black.png" alt="VMS Energy" loading="lazy" decoding="async">
        </a>
        <div class="cv-card-footer">
          <a class="btn btn-primary" href="https://vmsenergy.com/">vmsenergy.com</a>
        </div>
      </article>

      <article class="cv-card" data-type="VMS Energy Group">
        <a class="cv-card__link" href="VMS_Brief/VMS%20Group.html">
          <img src="VMS_Brief/assets/brand/Logos/vms_group_black.png" alt="VMS Energy Group" loading="lazy" decoding="async">
        </a>
        <div class="cv-card-footer">
          <a class="btn btn-primary" href="https://vmsenergygroup.com/">vmsenergygroup.com</a>
        </div>
      </article>

      <article class="cv-card" data-type="VMS Energy Inc">
        <a class="cv-card__link" href="VMS_Brief/VMS%20INC.html">
          <img src="VMS_Brief/assets/brand/Logos/vms_inc_black.png" alt="VMS Energy Inc" loading="lazy" decoding="async">
        </a>
        <div class="cv-card-footer">
          <a class="btn btn-primary" href="https://vmsenergyinc.com/">vmsenergyinc.com</a>
        </div>
      </article>
    </section>
  </div>
</section>
</body>
<footer> </footer>
  
</html>
